name: CI

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # fmt, clippy and build run on the dev toolchain, auto-installed by rustup
  # from rust-toolchain.toml. Only the test matrix pins explicit versions.
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        # Pinned floor (dev version from rust-toolchain.toml plus the three
        # below it) tests the toolchains you develop and ship on; "stable" and
        # "beta" track the moving channels. beta is allowed to fail, see
        # continue-on-error below. Raise the pinned list and rust-toolchain.toml
        # together by hand.
        rust: ["stable", "beta", "1.95", "1.94", "1.93", "1.92"]
        env:
          - name: ubuntu
            container: ""
          - name: debian
            container: "debian:12"
          - name: arch
            container: "archlinux:latest"
          - name: alpine
            container: "rust:1-alpine"
    name: test (${{ matrix.env.name }} / ${{ matrix.rust }})
    runs-on: ubuntu-latest
    # beta tracks the upcoming release; an upstream regression there must not
    # block the merge queue. ci-success counts a continued job as success.
    continue-on-error: ${{ matrix.rust == 'beta' }}
    container: ${{ matrix.env.container }}
    env:
      RUSTUP_TOOLCHAIN: ${{ matrix.rust }}
    steps:
      - name: Prep (debian)
        if: matrix.env.name == 'debian'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential pkg-config libssl-dev

      - name: Prep (arch)
        if: matrix.env.name == 'arch'
        run: |
          pacman -Syu --noconfirm git curl base-devel openssl pkgconf

      - name: Prep (alpine)
        if: matrix.env.name == 'alpine'
        shell: sh
        run: |
          apk add --no-cache git curl ca-certificates bash nodejs musl-dev

      - uses: actions/checkout@v6

      # Explicit per-version install: RUSTUP_TOOLCHAIN overrides
      # rust-toolchain.toml, and the distro containers have no preinstalled Rust.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master, pinned 2026-03-27
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.env.name }}-${{ matrix.rust }}

      - run: cargo test --all-features

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

  # Single stable status check for branch protection / merge queue. Matrix job
  # names shift when the version list changes; this gate name does not.
  ci-success:
    name: CI success
    if: ${{ always() }}
    needs: [fmt, clippy, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          for r in "${{ needs.fmt.result }}" "${{ needs.clippy.result }}" \
                   "${{ needs.test.result }}" "${{ needs.build.result }}"; do
            case "$r" in
              success | skipped) ;;
              *) echo "required job result: $r"; exit 1 ;;
            esac
          done
          echo "all required jobs succeeded or were skipped"
